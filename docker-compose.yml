services:
  server:
    image: ghcr.io/uid4oe/design-patterns-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - SERVER_PORT=3001
      - FRONTEND_URL=http://localhost:3000
    restart: unless-stopped

  frontend:
    image: ghcr.io/uid4oe/design-patterns-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
